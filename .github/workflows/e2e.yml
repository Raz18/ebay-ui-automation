name: eBay E2E Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      browser:
        description: "Browser profile to run (chrome, msedge, firefox, or all)"
        required: false
        default: "all"

env:
  HEADLESS: "true"
  EBAY_USERNAME: ${{ secrets.EBAY_USERNAME }}
  EBAY_PASSWORD: ${{ secrets.EBAY_PASSWORD }}

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: >-
          pytest tests/test_cart_actions_unit.py
          tests/test_product_page.py
          tests/test_login_unit.py
          tests/test_settings_unit.py
          -v --tb=short

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-unit
          path: reports/*/allure-results/

  e2e-tests:
    name: E2E — ${{ matrix.browser }}
    runs-on: ubuntu-latest
    needs: unit-tests
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, msedge, firefox]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps ${{ matrix.browser == 'firefox' && 'firefox' || 'chromium' }}

      - name: Run E2E tests (${{ matrix.browser }})
        run: >-
          pytest tests/test_e2e_full_flow.py
          --browser-profile=${{ matrix.browser }}
          -v --tb=short
          --reruns=1 --reruns-delay=3

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser }}
          path: reports/*/allure-results/

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.browser }}
          path: reports/*/screenshots/

      - name: Upload traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: traces-${{ matrix.browser }}
          path: reports/*/traces/
          if-no-files-found: ignore

  allure-report:
    name: Allure Report
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download all allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: reports/merged-allure-results
          merge-multiple: true

      - name: Generate Allure report
        uses: simple-elf/allure-report-action@v1.9
        with:
          allure_results: reports/merged-allure-results
          allure_report: reports/allure-report
          allure_history: reports/allure-history

      - name: Publish Allure report to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: reports/allure-report
