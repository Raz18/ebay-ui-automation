name: eBay E2E Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      browser:
        description: "Browser profile to run (chrome, msedge, firefox, or all)"
        required: false
        default: "all"

env:
  HEADLESS: "true"
  EBAY_USERNAME: ${{ secrets.EBAY_USERNAME }}
  EBAY_PASSWORD: ${{ secrets.EBAY_PASSWORD }}

jobs:
  e2e-tests:
    name: E2E — ${{ matrix.browser }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, msedge, firefox]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          if [ "${{ matrix.browser }}" = "firefox" ]; then
            python -m playwright install --with-deps firefox
          else
            python -m playwright install --with-deps chromium
          fi

      - name: Run E2E tests (${{ matrix.browser }})
        run: >-
          pytest tests/test_e2e_full_flow.py
          --browser-profile=${{ matrix.browser }}
          -v --tb=short
          --reruns=1 --reruns-delay=3

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser }}
          path: reports/*/allure-results/
          if-no-files-found: ignore

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.browser }}
          path: reports/*/screenshots/
          if-no-files-found: ignore

      - name: Upload traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: traces-${{ matrix.browser }}
          path: reports/*/traces/
          if-no-files-found: ignore

  allure-report:
    name: Allure Report
    runs-on: ubuntu-latest
    needs: e2e-tests
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download all allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: reports/merged-allure-results
          merge-multiple: true

      - name: Setup Java for Allure
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Allure CLI
        run: |
          curl -sL https://github.com/allure-framework/allure2/releases/download/2.32.0/allure-2.32.0.tgz | tar -xz
          echo "$PWD/allure-2.32.0/bin" >> $GITHUB_PATH

      - name: Generate Allure report
        run: allure generate reports/merged-allure-results -o reports/allure-report --clean

      - name: Upload Allure report artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: reports/allure-report/

      - name: Publish Allure report to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: reports/allure-report
